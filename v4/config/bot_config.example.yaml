discord:
  token: "YOUR_DISCORD_BOT_TOKEN_HERE"
  command_prefix: "!"
  auto_reply_on_mention: true
  auto_reply_on_reply: true
  max_message_length: 2000
  embed_color: 0x1E90FF
  status_message: "Flying high! ✈️"
  activity_type: "watching"

ai:
  model_name: "qwen2.5"
  model_path: "./models/qwen_3b"
  max_context_length: 4096
  temperature: 0.7
  top_p: 0.9
  max_tokens: 512
  timeout_seconds: 30
  enable_streaming: false

memory:
  enable_user_memory: true
  enable_conversation_history: true
  max_conversation_history: 50
  max_context_messages: 10
  memory_retention_days: 30
  auto_prune_enabled: true
  relevance_threshold: 0.5

knowledge:
  enable_rag: true
  vector_db_path: "./data/vector_db"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  max_search_results: 5
  similarity_threshold: 0.7
  enable_real_time_data: true
  cache_ttl_seconds: 300

security:
  enable_encryption: true
  encryption_key_path: "./keys/encryption.key"
  enable_audit_logging: true
  audit_log_path: "./logs/audit.log"
  max_login_attempts: 3
  session_timeout_minutes: 60
  enable_rate_limiting: true

api:
  aviation_weather_api_key: "YOUR_WEATHER_API_KEY_HERE"
  flight_tracking_api_key: "YOUR_FLIGHT_API_KEY_HERE"
  faa_api_key: "YOUR_FAA_API_KEY_HERE"
  request_timeout: 30
  max_retries: 3
  retry_delay: 1.0
  enable_caching: true
  cache_ttl: 300

monitoring:
  enable_metrics: true
  metrics_port: 8080
  enable_health_checks: true
  health_check_interval: 60
  log_level: "INFO"
  log_file_path: "./logs/aviation_bot.log"
  max_log_file_size: 10485760
  log_backup_count: 5

deployment:
  environment: "development"
  debug_mode: false
  enable_hot_reload: false
  graceful_shutdown_timeout: 30
  max_concurrent_requests: 100
  worker_threads: 4
  enable_container_mode: false