apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aviation-bot-data-pvc
  namespace: aviation-bot
  labels:
    app: aviation-girl-v4
    component: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aviation-bot-logs-pvc
  namespace: aviation-bot
  labels:
    app: aviation-girl-v4
    component: logs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard