apiVersion: v1
kind: Service
metadata:
  name: aviation-girl-v4-service
  namespace: aviation-bot
  labels:
    app: aviation-girl-v4
spec:
  type: ClusterIP
  ports:
  - name: health
    port: 8080
    targetPort: health
    protocol: TCP
  selector:
    app: aviation-girl-v4

---
apiVersion: v1
kind: Service
metadata:
  name: aviation-girl-v4-metrics
  namespace: aviation-bot
  labels:
    app: aviation-girl-v4
    service: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8080
    targetPort: health
    protocol: TCP
  selector:
    app: aviation-girl-v4